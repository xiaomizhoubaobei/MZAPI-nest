name: ESLint Code Quality Check

on:
  push:
    branches: [ "master" ]
    paths:
      - 'code/**/*.ts'
      - 'code/**/*.tsx'
      - 'code/**/*.js'
      - 'code/**/*.jsx'
      - 'code/.eslintrc.js'
      - 'code/package*.json'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'code/**/*.ts'
      - 'code/**/*.tsx'
      - 'code/**/*.js'
      - 'code/**/*.jsx'
      - 'code/.eslintrc.js'
      - 'code/package*.json'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  eslint:
    name: ESLint 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'code/package-lock.json'
      
      - name: 安装依赖
        run: |
          cd code
          npm ci
      
      - name: 运行 ESLint
        uses: icrawl/action-eslint@v1
        with:
          custom-glob: 'code/src'
          check-name: 'ESLint 检查结果'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}