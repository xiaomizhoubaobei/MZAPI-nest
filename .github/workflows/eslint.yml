name: ESLint Code Quality Check

on:
  push:
    branches: [ "master" ]
    paths:
      - 'code/**/*.ts'
      - 'code/**/*.tsx'
      - 'code/**/*.js'
      - 'code/**/*.jsx'
      - 'code/.eslintrc.js'
      - 'code/package*.json'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  eslint:
    name: ESLint 代码质量检查
    runs-on: ubuntu-latest
    steps:
       - name: 检出代码
        uses: actions/checkout@b4ffde65f46336ab88eb5afa803ae79a14bccdb5 # v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@60edb5dd545a775178f528a6a456c8e3559c038d # v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'code/package-lock.json'
      
      - name: 安装依赖
        run: |
          cd code
          npm ci
      
      - name: 运行 ESLint
        run: | 
          cd code
          npm run lint:check
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}