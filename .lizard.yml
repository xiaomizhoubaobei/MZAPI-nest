# Lizard Code Complexity Analysis Configuration
# Lizard is a code complexity analyzer for multiple programming languages

# File patterns to include in analysis
include:
  - "code/src/**/*.ts"
  - "code/src/**/*.js"
  - "code/**/*.ts"
  - "code/**/*.js"

# File patterns to exclude from analysis
exclude:
  - "code/node_modules/**"
  - "code/dist/**"
  - "code/build/**"
  - "code/**/*.spec.ts"
  - "code/**/*.test.ts"
  - "code/**/*.d.ts"
  - "code/coverage/**"
  - "**/*.min.js"

# Complexity thresholds
thresholds:
  # Cyclomatic complexity threshold
  ccn: 15
  # Function length threshold (lines of code)
  length: 50
  # Number of parameters threshold
  args: 7
  # Token count threshold
  token: 1000

# Output format options
output:
  # Output format: text, csv, html, xml
  format: "text"
  # Show warnings for functions exceeding thresholds
  warnings: true
  # Show detailed information
  verbose: false

# Language-specific settings
languages:
  javascript:
    extensions: [".js", ".jsx"]
  typescript:
    extensions: [".ts", ".tsx"]

# Analysis options
options:
  # Include duplicate code detection
  duplicate: false
  # Sort results by complexity
  sort: "ccn"
  # Show only functions exceeding thresholds
  warnings_only: false
  # Ignore empty functions
  ignore_empty: true
  # Working directory
  working_dir: "code"

# Custom rules for NestJS projects
nestjs:
  # Ignore decorators in complexity calculation
  ignore_decorators: true
  # Common NestJS patterns to consider
  patterns:
    - "@Controller"
    - "@Service"
    - "@Injectable"
    - "@Module"
    - "@Get"
    - "@Post"
    - "@Put"
    - "@Delete"
    - "@Patch"

# Report configuration
report:
  # Generate HTML report
  html: false
  # Report output directory
  output_dir: "reports/lizard"
  # Include trend analysis
  trend: false