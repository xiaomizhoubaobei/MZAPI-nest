name: TypeScript Reporter

on:
  push:
    branches: [ "master" ]
    paths:
      - 'code/**/*.ts'
      - 'code/**/*.tsx'
      - 'code/tsconfig*.json'
      - 'code/package*.json'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  typescript-reporter:
    name: TypeScript 类型安全检查
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'code/package-lock.json'
      
      - name: 安装依赖
        run: |
          cd code
          npm ci
      
      - name: TypeScript 类型检查 (严格模式)
        uses: gozala/typescript-error-reporter-action@v1.0.9
        with:
          project: code/tsconfig.json
          error_fail_threshold: 0
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
      
      - name: TypeScript 构建检查
        uses: gozala/typescript-error-reporter-action@v1.0.9
        with:
          project: code/tsconfig.build.json
          error_fail_threshold: 0
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}